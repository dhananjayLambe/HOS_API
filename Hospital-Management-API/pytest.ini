[pytest]
DJANGO_SETTINGS_MODULE = main.settings_test
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*
testpaths = .
norecursedirs = .git .venv __pycache__ media static logs templates migrations node_modules
addopts =
    --reuse-db
    --strict-markers
    --tb=short
    -ra
markers =
    slow: long-running tests (skip with -m "not slow")
    integration: full clinical chain or multi-app workflow
    transactional: requires real DB transaction (concurrency / race conditions)
