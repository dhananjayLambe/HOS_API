name: Doctor Dashboard Tests

on:
  push:
    paths:
      - "doctor/**"
      - "diagnostics_engine/api/services/doctor_report_counts.py"
      - "diagnostics_engine/api/views/reports/doctor_summary.py"
      - "diagnostics_engine/tests/test_doctor_report_summary.py"
      - "main/settings_test.py"
      - "pytest.ini"
      - "requirements*.txt"
      - ".github/workflows/doctor-dashboard-tests.yml"
  pull_request:
    paths:
      - "doctor/**"
      - "diagnostics_engine/api/services/doctor_report_counts.py"
      - "diagnostics_engine/api/views/reports/doctor_summary.py"
      - "diagnostics_engine/tests/test_doctor_report_summary.py"
      - "main/settings_test.py"
      - "pytest.ini"
      - "requirements*.txt"
      - ".github/workflows/doctor-dashboard-tests.yml"

jobs:
  test-doctor-dashboard:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 123
          POSTGRES_DB: demo5_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run doctor dashboard tests
        env:
          DJANGO_SETTINGS_MODULE: main.settings_test
          DB_NAME: demo5_db
          DB_USER: postgres
          DB_PASSWORD: 123
          DB_HOST: localhost
          DB_PORT: 5432
          TEST_DB_NAME: test_demo5_db
        run: make test-doctor-dashboard-all
