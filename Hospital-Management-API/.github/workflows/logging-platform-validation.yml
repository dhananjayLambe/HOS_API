name: Logging Platform Validation

on:
  push:
    paths:
      - "shared/logging/**"
      - "pytest.ini"
      - "requirements*.txt"
      - ".github/workflows/logging-platform-validation.yml"
  pull_request:
    paths:
      - "shared/logging/**"
      - "pytest.ini"
      - "requirements*.txt"
      - ".github/workflows/logging-platform-validation.yml"

jobs:
  logging-certification:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run logging certification suite
        env:
          DJANGO_SETTINGS_MODULE: main.settings_test
        run: |
          pytest shared/logging/tests/unit \
            shared/logging/tests/integration \
            shared/logging/tests/samples \
            --cov=shared.logging \
            --cov-config=shared/logging/.coveragerc \
            --cov-fail-under=95 \
            -v

      - name: Run performance benchmarks
        continue-on-error: true
        env:
          DJANGO_SETTINGS_MODULE: main.settings_test
        run: |
          pytest shared/logging/tests/performance -m slow -v
